{% extends "base.html" %}
{% block title %}Вход — {{ service_name }}{% endblock %}

{% block content %}
<div class="container" style="padding-top:2rem;padding-bottom:3rem">
  <h1 class="page-title" style="text-align:center">Вход в кабинет</h1>
  <div class="form card">
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
      <label>Email</label>
      <input type="email" name="email" value="{{ email or '' }}" required autocomplete="email">
      <label>Пароль</label>
      <input type="password" name="password" required autocomplete="current-password">
      <button type="submit" class="btn btn-block btn-lg">Войти</button>
    </form>
    <p class="form-hint" style="text-align:center">Нет аккаунта? <a href="/register">Регистрация</a></p>
  </div>
</div>
{% endblock %}
