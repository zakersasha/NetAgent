<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ service_name }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <header>
    <div class="container inner">
      <a href="/" class="logo">{{ service_name }}</a>
      <nav>
        {% if user_id %}
          <a href="/cabinet">Личный кабинет</a>
          <form action="/logout" method="post" style="display:inline">
            <button type="submit" class="btn btn-secondary" style="margin-left:1rem">Выйти</button>
          </form>
        {% elif admin_id %}
          <a href="/admin">Админка</a>
        {% else %}
          <a href="/login">Вход</a>
          <a href="/register">Регистрация</a>
        {% endif %}
      </nav>
    </div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer>
    <div class="container">{{ service_name }} · AI-ассистент и подписки</div>
  </footer>
</body>
</html>
