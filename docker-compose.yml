services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-netagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-netagent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-netagent} -d ${POSTGRES_DB:-netagent}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-netagent}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-netagent}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  monitor:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-netagent}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-netagent}
    command: ["python", "-m", "device_monitor.app"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-netagent}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-netagent}
    command: ["python", "-m", "webapp.main"]
    ports:
      - "${WEB_PORT:-8001}:${WEB_PORT:-8001}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  db-backup:
    build:
      context: .
      dockerfile: docker/Dockerfile.backup
    env_file:
      - .env
    environment:
      BACKUP_POSTGRES_HOST: postgres
      BACKUP_POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
