services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: netagent
      POSTGRES_USER: netagent
      POSTGRES_PASSWORD: netagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netagent -d netagent"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-mock-token}"
      PAYMENT_PROVIDER: mock
      BOT_SERVICE_NAME: "${BOT_SERVICE_NAME:-NetAgent VPN}"
      BOT_SUPPORT_CONTACT: "${BOT_SUPPORT_CONTACT:-Поддержка будет добавлена позже}"
      TIMEZONE: Europe/Moscow
      XRAY_PUBLIC_HOST: 45.93.137.80
    profiles:
      - bot

volumes:
  postgres_data:
