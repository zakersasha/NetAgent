services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: netagent
      POSTGRES_USER: netagent
      POSTGRES_PASSWORD: netagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netagent -d netagent"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
